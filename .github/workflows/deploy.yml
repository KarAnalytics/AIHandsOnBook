name: Build and deploy MyST site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to write to the Pages environment and request an OIDC token
# used by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# If a newer commit lands while an older run is still deploying, cancel the old
# one rather than queuing pushes behind each other.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mystmd
        run: npm install -g mystmd

      - name: Install Typst
        uses: typst-community/setup-typst@v3

      - name: Build HTML + PDF
        # BASE_URL tells MyST to emit URLs prefixed with /AIHandsOnBook so
        # internal links resolve correctly on karanalytics.github.io/AIHandsOnBook/.
        env:
          BASE_URL: /AIHandsOnBook
        run: |
          myst build --html
          # First PDF build downloads the plain_typst_book template into
          # _build/templates/typst/myst/plain_typst_book/. We then overwrite
          # its style.typ with our customized version (grey code blocks etc.)
          # and force a rebuild so the customizations actually take effect.
          myst build --pdf || true
          TEMPLATE_DIR=_build/templates/typst/myst/plain_typst_book
          if [ -d "$TEMPLATE_DIR" ]; then
            echo "Patching $TEMPLATE_DIR/style.typ with local customization"
            cp templates/plain_typst_book/style.typ "$TEMPLATE_DIR/style.typ"
          else
            echo "ERROR: expected template dir $TEMPLATE_DIR not found"
            ls -R _build/templates || true
            exit 1
          fi
          rm -f ai-for-business.pdf
          myst build --pdf --force
          # Place the PDF inside the Pages artifact so it is served at
          # karanalytics.github.io/AIHandsOnBook/ai-for-business.pdf.
          cp ai-for-business.pdf _build/html/

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

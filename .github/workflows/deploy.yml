name: Build and deploy MyST site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to write to the Pages environment and request an OIDC token
# used by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# If a newer commit lands while an older run is still deploying, cancel the old
# one rather than queuing pushes behind each other.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mystmd
        run: npm install -g mystmd

      - name: Build HTML site
        # BASE_URL tells MyST to emit URLs prefixed with /AIHandsOnBook so
        # internal links resolve correctly on karanalytics.github.io/AIHandsOnBook/.
        env:
          BASE_URL: /AIHandsOnBook
        run: myst build --html

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
